spring:
  datasource:
    url: jdbc:postgresql://localhost:5444/bank_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  liquibase:
    enabled: false

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/bank-realm
          jwk-set-uri: http://localhost:8080/realms/bank-realm/protocol/openid-connect/certs

jwt:
  secret: mySecretKeyForJWTGenerationWithEnoughLengthOf512Bits!!!
  expiration: 86400000

server:
  port: 8080

logging:
  level:
    org.springframework.jdbc: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE

# application.yml — главный конфигурационный файл Spring Boot.

